version: 2

# Weekly grouped dependency updates (ROADMAP Tier 2 #2). Two guardrails learned from the first
# run: (1) the suite-pinned Android build tooling (AGP / Kotlin / Compose-BOM, incl. their Gradle
# *plugin* coordinates) must never auto-bump — composite builds require they match Pulse; (2)
# major bumps need manual migration, so auto-PRs stay on minor/patch.

updates:
  - package-ecosystem: "pip"
    directory: "/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Suite-pinned build tooling (library AND Gradle-plugin coordinates — the plugin form
      # `org.jetbrains.kotlin.android` slipped past a `org.jetbrains.kotlin:*` ignore and pulled
      # Kotlin 2.4.0, breaking the composite build). Bump these deliberately, all repos at once.
      - dependency-name: "com.android*"
      - dependency-name: "org.jetbrains.kotlin*"
      - dependency-name: "androidx.compose:compose-bom"
      - dependency-name: "com.google.devtools.ksp*"
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      gradle:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
