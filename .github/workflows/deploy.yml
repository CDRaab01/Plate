name: Deploy

# Redeploys the self-hosted Plate server (Windows + Docker Desktop) on a
# self-hosted GitHub Actions runner. The runner long-polls GitHub *outbound*, so
# there are no inbound ports to open on the home network.
#
# Auto-deploy fires only after the CI workflow goes green on `main`
# (workflow_run), so a broken commit never ships. workflow_dispatch is a manual
# button that doubles as a rollback lever (pass a previous SHA in `ref`).
#
# Setup notes live in deploy/README.md ("Remote redeploy on push to main").

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA or branch to deploy (default: origin/main). Use a prior SHA to roll back."
        required: false
        default: "origin/main"

# Never let two deploys run at once; queue the second instead of colliding.
concurrency:
  group: plate-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Redeploy server
    # The `plate` label is assigned when the runner is registered on the host.
    runs-on: [self-hosted, plate]
    # Manual runs always proceed; automatic runs require a successful CI run on main
    # triggered by a push (NOT the weekly scheduled bit-rot run — that must not ship).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    steps:
      # No actions/checkout: we deploy the canonical clone on the host
      # (vars.PLATE_DIR), not the runner's ephemeral _work directory. That clone
      # owns the .env file and the pgdata Docker volume.
      #
      # shell: powershell is the built-in Windows PowerShell (5.1) — no PowerShell 7
      # (pwsh) install required on the host. GitHub context is passed via env (not
      # ${{ }} interpolated into code) so values can't break out of the script.
      - name: Redeploy
        shell: powershell
        env:
          PLATE_DIR: ${{ vars.PLATE_DIR }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:PLATE_DIR)) {
            throw "PLATE_DIR Actions variable is not set. See deploy/README.md."
          }
          if ($env:EVENT_NAME -eq 'workflow_dispatch') { $ref = $env:INPUT_REF }
          else { $ref = $env:WORKFLOW_SHA }
          if ([string]::IsNullOrWhiteSpace($ref)) { $ref = 'origin/main' }
          Write-Host "Deploying ref: $ref"
          & "$env:PLATE_DIR\deploy\redeploy.ps1" -Ref $ref

      # Post-deploy synthetic smoke (ROADMAP Tier 2 #3): proves auth + DB read/write actually work
      # against the just-deployed server, not just that /health is up. Registers-or-logs-in a
      # throwaway account, reads recipes, creates one, verifies it persisted, deletes it. A non-zero
      # exit fails the deploy run.
      - name: Post-deploy smoke
        shell: powershell
        env:
          PLATE_DIR: ${{ vars.PLATE_DIR }}
        run: |
          $ErrorActionPreference = "Stop"
          $proj = $env:PLATE_DIR
          # Run the smoke INSIDE the server container (python is there; the runner has no host
          # python on PATH), hitting the app on its internal port 8000. REGISTRATION_INVITE_CODE is
          # already in the container's env, so the script picks it up for the register-or-login.
          docker compose -f "$proj\docker-compose.yml" cp "$proj\scripts\synthetic_smoke.py" server:/tmp/smoke.py
          if ($LASTEXITCODE -ne 0) { throw "copying smoke script into container failed" }
          docker compose -f "$proj\docker-compose.yml" exec -T -e PLATE_URL=http://localhost:8000 server python /tmp/smoke.py
          if ($LASTEXITCODE -ne 0) { throw "post-deploy smoke FAILED" }
