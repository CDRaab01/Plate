name: CI

on:
  push:
    branches: ["main", "claude/**"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ── Server ────────────────────────────────────────────────────────────────

  server-lint:
    name: "Server — Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.4.4
      - run: ruff check app
        working-directory: server

  server-test:
    name: "Server — Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: plate
          POSTGRES_PASSWORD: plate
          POSTGRES_DB: plate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://plate:plate@localhost:5432/plate_test
      SECRET_KEY: ci-test-secret-key-not-for-production
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: pytest tests/ -v --tb=short

  # ── Android ───────────────────────────────────────────────────────────────

  android-test:
    name: "Android — Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :app:testDebugUnitTest --no-daemon

  android-screenshots:
    name: "Android — UI Screenshots"
    runs-on: ubuntu-latest
    needs: android-test
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: >-
          ./gradlew :app:testDebugUnitTest
          --tests "com.plate.screenshot.ScreenshotTest"
          --no-daemon -Proborazzi.test.compare=true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-screenshots-${{ github.sha }}
          path: |
            android/app/screenshots/**
            android/app/build/outputs/roborazzi/**
          retention-days: 30

  android-build:
    name: "Android — Assemble Debug APK"
    runs-on: ubuntu-latest
    needs: android-test
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :app:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: plate-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
