name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Weekly bit-rot check (Mondays 07:00 UTC) so "green" stays meaningful between pushes.
    # Deploy is guarded against scheduled runs (see deploy.yml) so this never ships.
    - cron: "0 7 * * 1"

# Signed release publishing moved to release.yml (auto on main pushes that touch android/**).
# This workflow is tests + debug build for push/PR only.

jobs:
  # ── Server ────────────────────────────────────────────────────────────────

  server-lint:
    name: "Server — Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff==0.4.4
      - run: ruff check app
        working-directory: server
      - run: ruff format --check app
        working-directory: server

  server-test:
    name: "Server — Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: plate
          POSTGRES_PASSWORD: plate
          POSTGRES_DB: plate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://plate:plate@localhost:5432/plate_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      # AI/photo tests mock LM Studio (httpx.MockTransport) and never reach it; these just pin the
      # config to a known test value so nothing depends on a developer's local default.
      LM_STUDIO_BASE_URL: http://localhost:1234/v1
      LM_STUDIO_MODEL: test-model
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: pytest tests/ -v --tb=short

  # ── Android ───────────────────────────────────────────────────────────────

  android-test:
    name: "Android — Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Plate/android
    steps:
      - uses: actions/checkout@v7
        with:
          path: Plate
      # Composite build needs the sibling Pulse repo (settings.gradle.kts includeBuild ../../Pulse).
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "server.url=${{ vars.PLATE_SERVER_URL || 'https://plate.dragonflymedia.org/' }}" >> local.properties
      # Exclude the Robolectric NATIVE-graphics screenshot tests from the gating job:
      # they download a ~100MB android-all runtime at test time and intermittently stall
      # CI for hours. The logic/ViewModel tests stay as the fast, reliable deploy gate;
      # screenshots run on demand via the manual "Android — UI Screenshots" job below.
      - run: ./gradlew :app:testDebugUnitTest --no-daemon -PexcludeScreenshots

  android-screenshots:
    name: "Android — UI Screenshots"
    runs-on: ubuntu-latest
    # Manual-only: the Robolectric native-graphics path is flaky on CI, so it no longer
    # gates push/PR (and therefore the auto-deploy). Run it on demand from the Actions
    # tab to record/compare screenshots.
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Plate/android
    steps:
      - uses: actions/checkout@v7
        with:
          path: Plate
      # Composite build needs the sibling Pulse repo (settings.gradle.kts includeBuild ../../Pulse).
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "server.url=${{ vars.PLATE_SERVER_URL || 'https://plate.dragonflymedia.org/' }}" >> local.properties
      - run: >-
          ./gradlew :app:testDebugUnitTest
          --tests "com.plate.screenshot.ScreenshotTest"
          --no-daemon -Proborazzi.test.compare=true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ui-screenshots-${{ github.sha }}
          path: |
            Plate/android/app/screenshots/**
            Plate/android/app/build/outputs/roborazzi/**
          retention-days: 30

  android-build:
    name: "Android — Assemble Debug APK"
    runs-on: ubuntu-latest
    needs: android-test
    defaults:
      run:
        working-directory: Plate/android
    steps:
      - uses: actions/checkout@v7
        with:
          path: Plate
      # Composite build needs the sibling Pulse repo (settings.gradle.kts includeBuild ../../Pulse).
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "server.url=${{ vars.PLATE_SERVER_URL || 'https://plate.dragonflymedia.org/' }}" >> local.properties
      - run: ./gradlew :app:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: plate-debug-${{ github.sha }}
          path: Plate/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
